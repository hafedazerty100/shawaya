<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block err_title %}Error{% endblock %} — Shawaya POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .err-box { text-align: center; max-width: 480px; padding: 2rem; }
    .err-code { font-size: 6rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg,#f59e0b,#ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .err-icon { font-size: 3rem; margin-bottom: 1rem; color: #f59e0b; }
    .err-title { font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem; }
    .err-msg { color: #94a3b8; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="err-box">
    <div class="err-code">{% block err_code %}{% endblock %}</div>
    <div class="err-icon"><i class="bi {% block err_icon %}bi-exclamation-circle{% endblock %}"></i></div>
    <h1 class="err-title">{% block err_heading %}Error{% endblock %}</h1>
    <p class="err-msg">{% block err_message %}An error occurred.{% endblock %}</p>
    <a href="/" class="btn btn-warning">Go Home</a>
  </div>
</body>
</html>
